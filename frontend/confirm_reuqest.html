<!DOCTYPE html>
<html>

<head>

<title>Confirm Blood Request</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
}

.container{
background:white;
width:350px;
margin:auto;
margin-top:80px;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

button{
padding:10px 18px;
background:#b30000;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<h2>Confirm Blood Request</h2>

<div class="container">

<h3 id="donorName"></h3>

<p><b>Blood Type:</b> <span id="blood"></span></p>

<p><b>Phone:</b> <span id="phone"></span></p>

<button onclick="confirmRequest()">Send Request</button>

</div>

<script>

const donor = JSON.parse(localStorage.getItem("selectedDonor"))

document.getElementById("donorName").innerText = donor.name
document.getElementById("blood").innerText = donor.blood_type
document.getElementById("phone").innerText = donor.phone

function confirmRequest(){

alert("Blood request sent to donor!")

window.location.href = "dashboard.html"

}

</script>

</body>

</html>
