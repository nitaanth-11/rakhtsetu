<!DOCTYPE html>
<html>

<head>

<title>Login - RakhtSetu</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
}

form{
background:white;
width:320px;
margin:auto;
margin-top:120px;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

input{
width:90%;
padding:10px;
margin:8px;
}

button{
padding:10px 20px;
background:#b30000;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

#error{
color:red;
margin-top:10px;
font-weight:bold;
}

</style>

</head>

<body>

<h2>RakhtSetu Login</h2>

<form id="loginForm">

<input type="text" id="phone" placeholder="Phone Number" required>

<input type="password" id="password" placeholder="Password" required>

<button type="submit">Login</button>

<div id="error"></div>

</form>

<p>New user? <a href="donor.html">Register here</a></p>

<script>

document.getElementById("loginForm").addEventListener("submit", async function(e){

e.preventDefault()

const data = {

phone: document.getElementById("phone").value,
password: document.getElementById("password").value

}

const res = await fetch("http://127.0.0.1:8000/login",{

method:"POST",
headers:{"Content-Type":"application/json"},
body: JSON.stringify(data)

})

const result = await res.json()

if(result.status === "success"){

localStorage.setItem("donor", JSON.stringify(result.donor))

window.location.href="dashboard.html"

}else{

document.getElementById("error").innerText = result.message

}

})

</script>

</body>

</html>
